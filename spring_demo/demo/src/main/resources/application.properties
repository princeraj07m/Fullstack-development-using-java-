spring.application.name=demo

spring.datasource.url=jdbc:mysql://localhost:3306/PLACEMENT?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=@Prince2427

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
# Hibernate 7 uses MySQLDialect (MySQL8Dialect was removed)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server port (changed to run on a different port)
server.port=8083

# JDBC Authentication: create users/authorities tables and insert default users on startup
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-users.sql
spring.sql.init.data-locations=classpath:data-users.sql
